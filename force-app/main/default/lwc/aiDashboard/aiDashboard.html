<template>
    <lightning-card title="AI Integration Dashboard" icon-name="custom:custom63">
        
        <!-- Summary Stats -->
        <div class="slds-grid slds-wrap slds-p-around_medium">
            <div class="slds-col slds-size_1-of-4 slds-p-around_x-small">
                <div class="slds-box slds-theme_shade slds-text-align_center">
                    <p class="slds-text-heading_large">{totalInteractions}</p>
                    <p class="slds-text-body_small">Total Interactions</p>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-4 slds-p-around_x-small">
                <div class="slds-box slds-theme_shade slds-text-align_center">
                    <p class="slds-text-heading_large slds-text-color_success">{successCount}</p>
                    <p class="slds-text-body_small">Successful</p>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-4 slds-p-around_x-small">
                <div class="slds-box slds-theme_shade slds-text-align_center">
                    <p class="slds-text-heading_large slds-text-color_error">{errorCount}</p>
                    <p class="slds-text-body_small">Errors</p>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-4 slds-p-around_x-small">
                <div class="slds-box slds-theme_shade slds-text-align_center">
                    <p class="slds-text-heading_large">{deniedCount}</p>
                    <p class="slds-text-body_small">Access Denied</p>
                </div>
            </div>
        </div>

        <!-- Interaction Log Table -->
        <div class="slds-p-around_medium">
            <h2 class="slds-text-heading_small slds-m-bottom_small">Recent AI Interactions</h2>
            <template if:true={logs}>
                <lightning-datatable
                    key-field="Id"
                    data={logs}
                    columns={columns}
                    hide-checkbox-column
                    sorted-by={sortedBy}
                    sorted-direction={sortedDirection}
                    onsort={handleSort}>
                </lightning-datatable>
            </template>
            <template if:true={noLogs}>
                <div class="slds-text-align_center slds-p-around_large">
                    <p class="slds-text-color_weak">No AI interactions logged yet.</p>
                </div>
            </template>
        </div>

        <!-- Refresh Button -->
        <div slot="footer">
            <lightning-button 
                label="Refresh" 
                variant="brand" 
                onclick={refreshLogs}
                icon-name="utility:refresh">
            </lightning-button>
        </div>
    </lightning-card>
</template>
